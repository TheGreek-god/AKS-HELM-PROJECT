# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/azure-pipelines-vscode/master/service-schema.json

trigger:
  - main

pool:
  vmImage: 'ubuntu-latest'

variables:
  dockerHubImage: 'greekgod659/starbucks:latest'
  acrName: 'greekgodacr.azurecr.io'
  imageRepository: 'starbucks-app'
  imageTag: 'latest'
  aksServiceConnection: 'azuredevops-azureportal-service-connection'
  helmChartPath: 'helm/my-app'
  helmReleaseName: 'starbucks-app-release'
  namespace: 'default'

stages:
- stage: ProvisionInfrastructure
  displayName: Provision Infrastructure with Terraform
  jobs:
  - job: TerraformJob
    displayName: Deploy Azure Resources
    steps:
    - task: TerraformInstaller@0
      displayName: Install Terraform
      inputs:
        terraformVersion: 'latest'

    - task: TerraformTaskV4@4
      displayName: Terraform Init
      inputs:
        provider: 'azurerm'
        command: 'init'
        workingDirectory: '$(System.DefaultWorkingDirectory)/terraform'
        backendServiceArm: '$(aksServiceConnection)'

    - task: TerraformTaskV4@4
      displayName: Terraform Plan
      inputs:
        provider: 'azurerm'
        command: 'plan'
        workingDirectory: '$(System.DefaultWorkingDirectory)/terraform'
        environmentServiceNameAzureRM: '$(aksServiceConnection)'

    - task: TerraformTaskV4@4
      displayName: Terraform Apply
      inputs:
        provider: 'azurerm'
        command: 'apply'
        workingDirectory: '$(System.DefaultWorkingDirectory)/terraform'
        environmentServiceNameAzureRM: '$(aksServiceConnection)'

- stage: PushImageToACR
  displayName: Push Docker Image to ACR
  dependsOn: ProvisionInfrastructure
  condition: succeeded()
  jobs:
  - job: PushImageJob
    displayName: Pull from Docker Hub and Push to ACR
    steps:
    - task: AzureCLI@2
      displayName: Pull, Tag and Push Image to ACR
      inputs:
        azureSubscription: '$(aksServiceConnection)'
        scriptType: 'bash'
        scriptLocation: 'inlineScript'
        inlineScript: |
          docker pull $(dockerHubImage)
          docker tag $(dockerHubImage) $(acrName)/$(imageRepository):$(imageTag)
          az acr login --name $(acrName)
          docker push $(acrName)/$(imageRepository):$(imageTag)

- stage: PackageHelm
  displayName: Package Helm Chart
  dependsOn: PushImageToACR
  condition: succeeded()
  jobs:
  - job: PackageJob
    displayName: Package Helm Chart
    steps:
    - task: HelmInstaller@1
      displayName: Install Helm
      inputs:
        helmVersionToInstall: '3.11.0'

    - task: Bash@3
      displayName: Package Helm Chart
      inputs:
        targetType: 'inline'
        script: |
          helm package $(helmChartPath) --version $(Build.BuildId)

    - task: PublishBuildArtifacts@1
      displayName: Publish Helm Chart Artifact
      inputs:
        PathtoPublish: '$(System.DefaultWorkingDirectory)/starbucks-app-$(Build.BuildId).tgz'
        ArtifactName: 'helm-chart'
        publishLocation: 'Container'

- stage: DeployToAKS
  displayName: Deploy to AKS
  dependsOn: PackageHelm
  condition: succeeded()
  jobs:
  - deployment: DeployJob
    displayName: Deploy with Helm to AKS
    environment: 'MyAKSCluster'
    strategy:
      runOnce:
        deploy:
          steps:
          - task: DownloadBuildArtifacts@1
            displayName: Download Helm Chart
            inputs:
              buildType: 'current'
              artifactName: 'helm-chart'
              downloadType: 'single'
              downloadPath: '$(System.DefaultWorkingDirectory)'

          - task: HelmInstaller@1
            displayName: Install Helm on Agent
            inputs:
              helmVersionToInstall: '3.11.0'

          - task: HelmDeploy@0
            displayName: Helm Upgrade Install
            inputs:
              connectionType: 'Azure Resource Manager'
              azureSubscriptionEndpoint: '$(aksServiceConnection)'
              azureResourceGroup: 'rg-aks-helm-project'
              kubernetesCluster: 'greekgodcluster'
              command: 'upgrade'
              chartType: 'FilePath'
              chartPath: '$(System.DefaultWorkingDirectory)/helm-chart/starbucks-app-$(Build.BuildId).tgz'
              releaseName: '$(helmReleaseName)'
              namespace: '$(namespace)'
              arguments: '--install'
              overrideValues: 'image.tag=$(imageTag),image.repository=$(acrName)/$(imageRepository)'
